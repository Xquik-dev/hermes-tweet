name: Publish

on:
  release:
    types: [published]

permissions:
  contents: read

concurrency:
  group: pypi-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
          cache: false

      - name: Workflow lint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: false

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked --python 3.12 --group dev

      - name: Validate release tag
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          git fetch --no-tags origin master:refs/remotes/origin/master
          uv run python - <<'PY'
          from pathlib import Path
          import os
          import tomllib

          with Path("pyproject.toml").open("rb") as pyproject_file:
              version = tomllib.load(pyproject_file)["project"]["version"]

          expected_ref = f"v{version}"
          actual_ref = os.environ["RELEASE_TAG"]
          if actual_ref != expected_ref:
              message = (
                  f"Release ref {actual_ref!r} must match "
                  f"pyproject version tag {expected_ref!r}."
              )
              raise SystemExit(message)
          PY
          tag_commit=$(git rev-parse --verify "refs/tags/${RELEASE_TAG}^{commit}")
          head_commit=$(git rev-parse HEAD)
          master_commit=$(git rev-parse refs/remotes/origin/master)
          test "$tag_commit" = "$head_commit" || {
            echo "Release tag must resolve to the checked-out commit."
            exit 1
          }
          test "$tag_commit" = "$master_commit" || {
            echo "Release tag must resolve to the protected master tip."
            exit 1
          }

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run basedpyright

      - name: Test with coverage
        run: uv run pytest --cov=hermes_tweet --cov=tests --cov-report=term-missing --cov-fail-under=100

      - name: Security scan
        run: uv run bandit -c pyproject.toml -r hermes_tweet scripts

      - name: Public safety scan
        run: uv run python scripts/check_public_safety.py

      - name: Public link scan
        run: uv run python scripts/check_public_links.py

      - name: Hermes Agent compatibility
        run: uv run python scripts/check_hermes_agent_compat.py
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Dependency audit
        run: uv run pip-audit

      - name: Build package
        run: uv run python -m build

      - name: Check package metadata
        run: uv run twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: distributions
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment:
      name: pypi
      url: https://pypi.org/project/hermes-tweet/
    permissions:
      contents: read
      id-token: write # Exchange the release identity for a short-lived PyPI token.
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: distributions
          path: dist

      - name: Publish distributions
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          attestations: true
          packages-dir: dist/
