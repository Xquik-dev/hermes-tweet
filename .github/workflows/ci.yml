name: CI

on:
  pull_request:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Check
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: stable
          cache: false

      - name: Workflow lint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Install uv
        uses: astral-sh/setup-uv@f98e06938123ccabd21905ea5d0069192241f9f1 # v8.3.1

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked --python 3.12 --extra dev

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run basedpyright

      - name: Hermes Agent compatibility
        run: uv run python scripts/check_hermes_agent_compat.py
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Public safety scan
        run: uv run python scripts/check_public_safety.py

      - name: Test with coverage
        run: uv run pytest --cov=hermes_tweet --cov=tests --cov-report=term-missing --cov-fail-under=100

      - name: Security scan
        run: uv run bandit -c pyproject.toml -r hermes_tweet scripts

      - name: Dependency audit
        run: uv run pip-audit

      - name: Build package
        run: uv run python -m build

      - name: Check package metadata
        run: uv run twine check dist/*
