name: CI

on:
  pull_request:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: check
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: stable
          cache: false

      - name: Workflow lint
        run: go run github.com/rhysd/actionlint/cmd/actionlint@v1.7.12

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --locked --python 3.12 --group dev

      - name: Format check
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run basedpyright

      - name: Hermes Agent compatibility
        run: uv run python scripts/check_hermes_agent_compat.py
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Public safety scan
        run: uv run python scripts/check_public_safety.py

      - name: License header check
        run: uv run python scripts/check_license_headers.py

      - name: Test with coverage
        run: uv run pytest --cov=hermes_tweet --cov=tests --cov-report=term-missing --cov-fail-under=100

      - name: Security scan
        run: uv run bandit -c pyproject.toml -r hermes_tweet scripts fuzz

      - name: Dependency audit
        run: uv run pip-audit

      - name: Check reproducible package
        run: bash scripts/check_reproducible.sh

      - name: Build package
        env:
          SOURCE_DATE_EPOCH: "946684800"
        run: uv run python -m build

      - name: Check package metadata
        run: uv run twine check dist/*
